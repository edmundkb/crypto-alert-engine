spring:
  application:
    name: crypto-alert-engine
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  datasource:
    url: jdbc:postgresql://postgres-service:5432/cryptodb
    username: crypto_user
    password: crypto_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10   # Keep below 10 for local
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000
  sql:
    init:
      mode: always
  threads:
    virtual:
      enabled: true

server:
  port: 8081

livenessProbe:
  httpGet:
    path: /actuator/health
    port: 8081
  initialDelaySeconds: 30
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /actuator/health
    port: 8081
  initialDelaySeconds: 30
  periodSeconds: 10

jpa:
  hibernate:
    ddl-auto: update
  show-sql: true
  properties:
    hibernate:
      dialect: org.hibernate.dialect.PostgreSQLDialect